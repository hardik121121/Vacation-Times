[build]
  command   = "npm run build"
  publish   = "dist"

[[headers]]
  for = "/*.mp4"
  [headers.values]
    Accept-Ranges    = "bytes"
    Cache-Control    = "public, max-age=31536000, immutable"
    Content-Type     = "video/mp4"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
